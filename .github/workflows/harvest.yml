name: harvest

on:
  schedule:
    - cron: "0 21 * * *"   # 06:00 JST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  harvest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r harvester/requirements.txt
      - name: Run harvester
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python harvester/harvest.py
      - name: Commit if changed
        run: |
          git config user.name "cchub-bot"
          git config user.email "cchub-bot@users.noreply.github.com"
          if ! git diff --quiet data/items.json; then
            git add data/items.json
            git commit -m "harvest: $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          else
            echo "no change"
          fi
