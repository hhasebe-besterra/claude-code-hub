name: harvest

on:
  schedule:
    - cron: "0 * * * *"   # 毎時 00 分 UTC（JSTでも毎時 00 分）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  harvest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r harvester/requirements.txt
      - name: Run harvester
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python harvester/harvest.py
      - name: Auto-translate new items
        if: env.ANTHROPIC_API_KEY != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python harvester/translate.py
      - name: Commit if changed
        run: |
          git config user.name "cchub-bot"
          git config user.email "cchub-bot@users.noreply.github.com"
          git add data/items.json data/translations.json
          if ! git diff --cached --quiet; then
            git commit -m "harvest: $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          else
            echo "no change"
          fi
