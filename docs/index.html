<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>Claude Code Hub</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="style.css?v=5">
</head>
<body>
<header>
  <h1>Claude Code Hub</h1>
  <div class="meta">
    <span id="lastUpdate">最終更新: 読み込み中...</span>
    <span id="nextUpdate" class="timer" title="次回自動収集までのカウントダウン（毎時 00 分 JST）"></span>
    <button id="authBtn" title="GitHub PAT を登録">🔑</button>
    <button id="refreshBtn" title="再読込">↻</button>
  </div>
</header>

<nav class="filters">
  <label><input type="checkbox" class="f" value="mcp" checked> MCP</label>
  <label><input type="checkbox" class="f" value="skill" checked> Skill</label>
  <label><input type="checkbox" class="f" value="command" checked> Command</label>
  <label><input type="checkbox" class="f" value="tip" checked> Tip</label>
  <label class="hot-only"><input type="checkbox" id="hotOnly"> 🔥のみ</label>
  <label>並び順:
    <select id="sortBy">
      <option value="hot">🔥ホット＋新着順（既定）</option>
      <option value="date">📅 新しい順</option>
      <option value="views">⭐ 視聴多い順</option>
      <option value="type">🗂 種別ごと</option>
    </select>
  </label>
  <label><input type="checkbox" id="hideInstalled"> 導入済みを隠す</label>
  <input type="search" id="q" placeholder="検索（タイトル・タグ・要約）">
</nav>

<div id="sortInfo" class="sort-info"></div>

<div id="applyBar" class="apply-bar">
  <div id="applyInfo" class="apply-info">変更なし</div>
  <div class="apply-buttons">
    <button id="cancelBtn" disabled>破棄</button>
    <button id="applyBtn" class="apply-primary" disabled>反映する</button>
  </div>
</div>

<div id="progressBar" class="progress-bar"></div>

<main id="cards"></main>

<footer>
  <div>
    <strong>使い方：</strong>
    カードの☑（導入する）をON/OFFした後、上部の緑の「<b>反映する</b>」ボタンを押して GitHub に送信。
    watcher（ローカル）が60秒以内にダウンロード＆導入します。
  </div>
  <div>
    状態の見方： ⏳導入予約（未反映） → 反映ボタン → ✅導入済み（グレーアウト）／↩解除予約はその逆。
  </div>
  <div>収集間隔：毎時 00 分（GitHub Actions）。PAT が未登録の場合は反映時に🔑プロンプト。</div>
</footer>

<script src="app.js?v=5"></script>
</body>
</html>
